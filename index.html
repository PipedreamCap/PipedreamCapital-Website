<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipe Dream Capital</title>
<meta name="description" content="Pipe Dream Capital — private investment and philanthropy, built to last.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;1,300&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0b2450;
    --slate:#545c68;
    --bg:#f6f7f9;
    --hairline:rgba(11,36,80,.16);
    --ink-soft:#3a4453;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--navy);
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    /* faint tonal wash so the flat pale bg reads intentional, not blank */
    background-image:radial-gradient(120% 80% at 50% 8%, #fbfcfd 0%, var(--bg) 46%, #eef0f4 100%);
  }

  main{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:2rem 1.5rem;
  }

  .logo{
    width:min(360px,74vw);
    height:auto;
    opacity:0;
    animation:rise 1.1s cubic-bezier(.2,.7,.2,1) .15s forwards;
  }

  .wave{
    width:min(180px,42vw);
    height:22px;
    margin:1.9rem 0 1.6rem;
    overflow:visible;
  }
  .wave path{
    fill:none;
    stroke:var(--navy);
    stroke-width:1.4;
    stroke-linecap:round;
    stroke-dasharray:260;
    stroke-dashoffset:260;
    opacity:.55;
    animation:draw 1.5s cubic-bezier(.65,0,.35,1) .75s forwards;
  }

  .tagline{
    font-family:'Spectral',Georgia,serif;
    font-weight:300;
    font-size:clamp(1.15rem,3.4vw,1.6rem);
    line-height:1.45;
    letter-spacing:.01em;
    color:var(--ink-soft);
    max-width:26ch;
    opacity:0;
    animation:rise 1.1s cubic-bezier(.2,.7,.2,1) .5s forwards;
  }
  .tagline em{
    font-style:italic;
    color:var(--navy);
  }

  footer{
    padding:2.4rem 1.5rem 3rem;
    text-align:center;
    opacity:0;
    animation:rise 1.1s cubic-bezier(.2,.7,.2,1) 1s forwards;
  }
  .contact-label{
    display:block;
    font-size:.66rem;
    letter-spacing:.24em;
    text-transform:uppercase;
    color:var(--slate);
    margin-bottom:.65rem;
  }
  .contact{
    display:inline-block;
    font-size:1.02rem;
    letter-spacing:.01em;
    color:var(--navy);
    text-decoration:none;
    padding-bottom:2px;
    border-bottom:1px solid var(--hairline);
    transition:border-color .3s ease,color .3s ease;
  }
  .contact:hover,.contact:focus-visible{
    border-color:var(--navy);
    outline:none;
  }
  .contact:focus-visible{
    outline:2px solid var(--navy);
    outline-offset:6px;
    border-radius:2px;
  }
  .colophon{
    margin-top:2.2rem;
    font-size:.72rem;
    letter-spacing:.03em;
    color:var(--slate);
  }

  @keyframes rise{
    from{opacity:0;transform:translateY(14px)}
    to{opacity:1;transform:translateY(0)}
  }
  @keyframes draw{
    to{stroke-dashoffset:0}
  }

  @media (prefers-reduced-motion:reduce){
    .logo,.tagline,footer{animation:none;opacity:1;transform:none}
    .wave path{animation:none;stroke-dashoffset:0}
  }
</style>
</head>
<body>
  <main>
    <img class="logo" src="pipedream-logo.png" alt="Pipe Dream Capital">

    <svg class="wave" viewBox="0 0 200 22" aria-hidden="true" preserveAspectRatio="xMidYMid meet">
      <path d="M2 14 C 34 2, 62 2, 96 12 S 166 22, 198 8"/>
    </svg>

    <p class="tagline">Private investment and philanthropy, <em>built to last.</em></p>
  </main>

  <footer>
    <span class="contact-label">Contact</span>
    <a class="contact" href="mailto:info@pipedreamcapital.com">info@pipedreamcapital.com</a>
    <div class="colophon">&copy; 2026 Pipe Dream Capital</div>
  </footer>
</body>
</html>
